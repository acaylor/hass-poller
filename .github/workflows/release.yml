name: Release

# Cuts a release whenever a v*.*.* tag is pushed. The release workflow:
#   1. Re-runs the full test suite (gating).
#   2. (GitHub only) Builds and pushes a multi-arch container image to ghcr.io.
#   3. Creates a release on the hosting forge with the changelog body for
#      the version (works on both GitHub and Gitea — softprops/action-gh-release
#      honors $GITHUB_API_URL).
#
# The docker-publish steps are guarded by `github.server_url == 'https://github.com'`
# so a tag push on Gitea still produces a Gitea release; it just skips ghcr.io.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tag
        uses: actions/checkout@v6

      - name: Extract changelog section for this version
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the body between "## [VERSION]" and the next "## " heading.
          awk -v marker="## [${VERSION}]" '
            index($0, marker) == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for ${VERSION}" >&2
            exit 1
          fi
          echo "Extracted release notes:"
          cat release-notes.md

      - name: Set up QEMU
        if: github.server_url == 'https://github.com'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.server_url == 'https://github.com'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.server_url == 'https://github.com'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        if: github.server_url == 'https://github.com'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        if: github.server_url == 'https://github.com'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
