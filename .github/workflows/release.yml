name: Release

# Cuts a release whenever a v*.*.* tag is pushed.
#
# Compatible with both GitHub Actions and Gitea Actions:
#   - Gitea reads workflows from both .gitea/workflows/ and .github/workflows/.
#   - softprops/action-gh-release@v2 honors $GITHUB_API_URL, which Gitea sets
#     to its own API base, so the same step creates a release on either host.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tag
        uses: actions/checkout@v6

      - name: Extract changelog section for this version
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the body between "## [VERSION]" and the next "## " heading.
          awk -v marker="## [${VERSION}]" '
            index($0, marker) == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for ${VERSION}" >&2
            exit 1
          fi
          echo "Extracted release notes:"
          cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
