name: Test

on:
  push:
    branches:
      - main
  pull_request:
  # Allow the release workflow to gate on this one via `uses:`.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ''
          go-version-file: go.mod

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Verify Docker image builds
        run: docker build -t hass-poller:ci .
