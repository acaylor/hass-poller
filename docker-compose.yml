services:
  timescaledb:
    image: timescale/timescaledb:2.26.4-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
    volumes:
      - tsdb-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

  poller:
    build: .
    depends_on:
      - timescaledb
    environment:
      HA_BASE_URL: ${HA_BASE_URL:?set HA_BASE_URL in .env}
      HA_TOKEN: ${HA_TOKEN:?set HA_TOKEN in .env}
      PG_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-warehouse}?sslmode=disable
      POLL_INTERVAL: ${POLL_INTERVAL:-1m}
      ENTITY_ALLOWLIST: ${ENTITY_ALLOWLIST:-sensor.*}
      ENTITY_BLOCKLIST: ${ENTITY_BLOCKLIST:-}
      EPSILON_DEFAULT: ${EPSILON_DEFAULT:-0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped

  adminer:
    image: adminer:5.4.2
    depends_on:
      - timescaledb
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: timescaledb
    restart: unless-stopped

volumes:
  tsdb-data:
